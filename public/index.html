<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가상내짤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f8fbf8 0%, #e8f5e9 100%);
            color: #2d3a2d;
            overflow-x: hidden;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .logo {
            height: 50px;
            margin-bottom: 15px;
        }

        .subtitle {
            color: rgba(45, 58, 45, 0.7);
            font-size: 14px;
            margin-bottom: 40px;
            text-align: center;
        }

        .upload-area {
            width: 100%;
            max-width: 400px;
            background: rgba(124, 179, 66, 0.1);
            border: 2px dashed rgba(124, 179, 66, 0.4);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover,
        .upload-area.drag-over {
            border-color: #7CB342;
            background: rgba(124, 179, 66, 0.15);
        }

        .upload-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: rgba(124, 179, 66, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-icon svg {
            width: 40px;
            height: 40px;
            stroke: #7CB342;
            fill: none;
            stroke-width: 2;
        }

        .upload-text {
            font-size: 16px;
            color: #2d3a2d;
            margin-bottom: 10px;
        }

        .upload-hint {
            font-size: 12px;
            color: rgba(45, 58, 45, 0.6);
        }

        #file-input {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .btn-primary {
            background: #7CB342;
            color: #0f1f0f;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(124, 179, 66, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(124, 179, 66, 0.15);
            color: #2d5a2d;
            border: 1px solid rgba(124, 179, 66, 0.5);
        }

        .btn-secondary:hover {
            background: rgba(124, 179, 66, 0.25);
        }

        .preview-container {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
            display: none;
        }

        .preview-container.visible {
            display: block;
        }

        .preview-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
        }

        .preview-info {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(45, 58, 45, 0.7);
            text-align: center;
        }

        .progress-container {
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
            display: none;
        }

        .progress-container.visible {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(124, 179, 66, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #7CB342;
            transition: width 0.3s ease;
        }

        .progress-text {
            margin-top: 10px;
            font-size: 14px;
            color: #2d5a2d;
            text-align: center;
        }

        #ar-button {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background: #7CB342;
            border: none;
            border-radius: 50px;
            color: #0f1f0f;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 30px rgba(124, 179, 66, 0.4);
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #ar-button.visible {
            display: flex;
        }

        #ar-button:active {
            transform: scale(0.98);
            background: #689F38;
        }

        #ar-button svg {
            width: 24px;
            height: 24px;
            stroke: #0f1f0f;
            fill: none;
            stroke-width: 2;
        }

        .result-container {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
            display: none;
        }

        .result-container.visible {
            display: block;
        }

        .result-label {
            font-size: 14px;
            color: #7CB342;
            margin-bottom: 10px;
        }

        .result-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            background: repeating-conic-gradient(#e8f5e9 0% 25%, #d0e8d0 0% 50%) 50% / 20px 20px;
        }

        .error-message {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.5);
            border-radius: 10px;
            color: #ff6464;
            font-size: 14px;
            display: none;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .error-message.visible {
            display: block;
        }

        @media (max-width: 480px) {
            .logo {
                height: 40px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="logo.png" alt="가상내짤" class="logo">
        <p class="subtitle">이미지에서 배경을 자동으로 제거하고<br>AR로 표시합니다</p>

        <div class="upload-area" id="upload-area">
            <div class="upload-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </div>
            <p class="upload-text">이미지를 탭하여 선택하세요</p>
            <p class="upload-hint">JPG, PNG, WebP 지원 (최대 10MB)</p>
        </div>

        <input type="file" id="file-input" accept="image/*">

        <div class="button-group">
            <button class="btn btn-primary" id="gallery-btn">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                갤러리
            </button>
            <button class="btn btn-secondary" id="camera-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                카메라
            </button>
        </div>

        <div class="preview-container" id="preview-container">
            <img class="preview-image" id="preview-image" alt="미리보기">
            <p class="preview-info" id="preview-info"></p>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text">배경 제거 중...</p>
        </div>

        <div class="result-container" id="result-container">
            <p class="result-label">✓ 배경 제거 완료</p>
            <img class="result-image" id="result-image" alt="결과">
        </div>

        <button id="ar-button">
            <svg viewBox="0 0 24 24">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            <span>AR로 보기</span>
        </button>

        <div class="error-message" id="error-message"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
